name: Aura Trade AI Runner

on:
  schedule:
    - cron: '0 * * * *' # Ejecución cada hora
  workflow_dispatch: # Permite ejecución manual

# Evita que múltiples ejecuciones choquen entre sí
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Acelera la instalación en futuras ejecuciones

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          # Instalamos exactamente lo que muestra tu imagen de requirements.txt
          pip install ccxt==4.1.100 pandas pandas_ta scikit-learn requests plotly flask

      - name: Ejecutar Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
        run: python main.py

      - name: Guardar cambios en el Repositorio
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update logs and history" && git push)






