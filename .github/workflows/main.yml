name: Aura Trade AI Runner

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta cada hora
  workflow_dispatch: # Permite que lo ejecutes tú a mano

# Esta parte evita que el bot se cancele si lo ejecutas varias veces
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # Para que el bot pueda guardar su historial

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Esto hace que la próxima vez sea más rápido

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          # Instalamos exactamente lo de tu imagen de requirements.txt
          pip install ccxt==4.1.100 pandas pandas_ta scikit-learn requests plotly flask

      - name: Ejecutar Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
        run: python main.py

      - name: Guardar historial de ganancias
        if: always() # Aunque el bot falle, intentará guardar logs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update trade history" && git push)





